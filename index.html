    <script>
      (function () {
        var fab = document.getElementById('wa-fab');
        var popup = document.getElementById('wa-popup');
        var closeBtn = document.getElementById('wa-close-btn');
        var badge = document.getElementById('wa-badge');
        var isOpen = false;

        function openPopup() {
          isOpen = true;
          badge.style.display = 'none';
          popup.classList.add('open');
          requestAnimationFrame(function () {
            requestAnimationFrame(function () { popup.classList.add('visible'); });
          });
        }

        function closePopup() {
          isOpen = false;
          popup.classList.remove('visible');
          setTimeout(function () { popup.classList.remove('open'); }, 260);
        }

        fab.addEventListener('click', function () { isOpen ? closePopup() : openPopup(); });
        fab.addEventListener('keydown', function (e) { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); isOpen ? closePopup() : openPopup(); } });
        closeBtn.addEventListener('click', function (e) { e.stopPropagation(); closePopup(); });

        // Auto-open after 4s on first visit
        if (!sessionStorage.getItem('wa-opened')) {
          setTimeout(function () {
            sessionStorage.setItem('wa-opened', '1');
            openPopup();
          }, 4000);
        }
      })();
